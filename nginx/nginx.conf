events {
    worker_connections 1024;
}

http {
    # HTTP: serve certbot webroot challenge, redireciona o resto para HTTPS
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot challenge (necessário para renovação)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Tudo mais → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS reverse proxy
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/coruja.crt;
        ssl_certificate_key /etc/nginx/ssl/coruja.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # API
        location /api/ {
            proxy_pass         http://api:8000/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # WebSocket
        location /api/v1/ws/ {
            proxy_pass         http://api:8000/api/v1/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass         http://frontend:3000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
