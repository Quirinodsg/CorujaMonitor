events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Timeouts
    proxy_connect_timeout  60s;
    proxy_send_timeout     300s;
    proxy_read_timeout     300s;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS reverse proxy
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/coruja.crt;
        ssl_certificate_key /etc/nginx/ssl/coruja.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── WebSocket (deve vir ANTES de /api/ para ter precedência) ──
        location /api/v1/ws/ {
            proxy_pass         http://api:8000/api/v1/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # ── API REST ──
        location /api/ {
            proxy_pass         http://api:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Authorization $http_authorization;
            proxy_read_timeout 300s;
            # Reescreve Location header do 307 (http://api:8000/...) para URL pública
            proxy_redirect     http://api:8000/ https://$host/;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }

        # ── Frontend (React dev server) ──
        location / {
            proxy_pass         http://frontend:3000/;
            proxy_http_version 1.1;
            # Necessário para webpack hot-reload WS (interno, não exposto ao browser)
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
