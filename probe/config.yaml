# ========================================
# CONFIGURACAO CORUJA MONITOR PROBE
# ========================================

# Servidor Coruja Monitor
server:
  host: "192.168.31.161"
  port: 8000
  protocol: "http"

# Token de autenticacao
token: "V-PTetiHvbNsZgrkY14PFGRfyv6jPBZxdTb76Z2M7YY"

# Identificacao da Probe
probe:
  name: "SRVSONDA001"
  location: ""
  # ── Coleta Paralela (feature flag) ──
  # Ativar para coleta estilo PRTG (ThreadPoolExecutor)
  # false = modo sequencial (atual, seguro)
  # true = modo paralelo (mais rápido)
  parallel_enabled: false
  max_workers: 8
  timeout_seconds: 30
  dispatch_mode: "bulk"  # bulk ou incremental

# Intervalo de coleta (segundos)
collection_interval: 60

# Logs
logging:
  level: "INFO"
  file: "logs/probe.log"
  max_size_mb: 10
  backup_count: 5

# Coletores habilitados
collectors:
  system: true
  ping: true
  snmp: true
  docker: false
  kubernetes: false
  wmi_remote: false
