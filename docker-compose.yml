version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: coruja-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations/timescaledb_setup.sql:/docker-entrypoint-initdb.d/01_timescaledb.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coruja-redis
    restart: always
    environment:
      TZ: America/Sao_Paulo
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: coruja-api
    restart: always
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AI_MODEL=llama2
      - TZ=America/Sao_Paulo
      # v3 Streaming
      - METRICS_STREAM_KEY=metrics_stream
      - EVENTS_STREAM_KEY=events_stream
      - STREAM_CONSUMER_GROUP=coruja-consumers
      - STREAM_BATCH_SIZE=500
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./core:/app/core
      - ./engine:/app/engine
      - ./topology_engine:/app/topology_engine
      - ./event_processor:/app/event_processor
      - ./ai_agents:/app/ai_agents
      - ./alert_engine:/app/alert_engine
      - ./sensor_dsl:/app/sensor_dsl
      - api_logs:/app/logs
      - backups_data:/app/backups
      - ./security:/app/security
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/routers --reload-dir /app/core --reload-dir /app/ai_agents --reload-dir /app/alert_engine --reload-exclude '*.py.bak' --reload-exclude 'fix_*.py' --reload-exclude 'migrate_*.py' --reload-exclude 'seed_*.py' --reload-exclude 'create_*.py' --reload-exclude 'check_*.py' --reload-exclude 'cleanup_*.py' --reload-delay 2

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: coruja-worker
    restart: always
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
      # v3 Streaming
      - METRICS_STREAM_KEY=metrics_stream
      - EVENTS_STREAM_KEY=events_stream
      - STREAM_CONSUMER_GROUP=coruja-consumers
      - STREAM_BATCH_SIZE=500
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app
      - ./core:/app/core
      - ./engine:/app/engine
      - ./topology_engine:/app/topology_engine
      - ./event_processor:/app/event_processor
      - ./ai_agents:/app/ai_agents
      - ./alert_engine:/app/alert_engine
      - ./sensor_dsl:/app/sensor_dsl
      - worker_logs:/app/logs
      - backups_data:/app/backups
    command: celery -A tasks worker --beat --loglevel=info --concurrency=4

  ollama:
    image: ollama/ollama:latest
    container_name: coruja-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - TZ=America/Sao_Paulo

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: coruja-ai-agent
    restart: always
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AI_MODEL=llama2
      - TZ=America/Sao_Paulo
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./ai-agent:/app
      - ai_logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coruja-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    environment:
      - REACT_APP_API_URL=
      - CHOKIDAR_USEPOLLING=true
      - TZ=America/Sao_Paulo
      # Desabilita hot-reload WebSocket do webpack-dev-server (evita wss://:3000/ws via nginx)
      - WDS_SOCKET_PORT=0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  nginx:
    image: nginx:alpine
    container_name: coruja-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    entrypoint: ["/docker-entrypoint-ssl.sh"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/docker-entrypoint-ssl.sh:/docker-entrypoint-ssl.sh:ro
      - ./scripts:/scripts:ro
      - /var/www/certbot:/var/www/certbot:ro
    environment:
      - TZ=America/Sao_Paulo
      - CORUJA_SERVER_IP=192.168.31.161
      - CORUJA_DOMAIN=coruja.empresaxpto.com.br

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  api_logs:
  worker_logs:
  ai_logs:
  backups_data:
