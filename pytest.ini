[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -q

[coverage:run]
source =
    core
    engine
    topology_engine
    event_processor
    ai_agents
    alert_engine
    sensor_dsl

[coverage:report]
show_missing = true
fail_under = 80
omit =
    */test_*
    */__pycache__/*
    */__init__.py
