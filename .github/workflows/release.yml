name: Build and Release Coruja Monitoring

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ============================================
  # Build Windows Installer (MSI)
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pyinstaller

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build executables
        run: |
          pyinstaller --onefile --windowed --name coruja-api api/main.py
          pyinstaller --onefile --name coruja-probe probe/probe_core.py

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y

      - name: Build MSI installer
        run: |
          candle.exe installer/coruja.wxs -out installer/coruja.wixobj
          light.exe installer/coruja.wixobj -out installer/CorujaMonitoring-${{ github.ref_name }}.msi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/*.msi
          retention-days: 30

  # ============================================
  # Build Linux Packages (DEB, RPM, AppImage)
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev fakeroot
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build DEB package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${{ github.ref_name }}

      - name: Build RPM package
        run: |
          chmod +x scripts/build-rpm.sh
          ./scripts/build-rpm.sh ${{ github.ref_name }}

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          ./scripts/build-appimage.sh ${{ github.ref_name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm
            *.AppImage
          retention-days: 30

  # ============================================
  # Build macOS Installer (DMG)
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh ${{ github.ref_name }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "*.dmg"
          retention-days: 30

  # ============================================
  # Build Docker Images
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/coruja-api:latest
            ${{ secrets.DOCKER_USERNAME }}/coruja-api:${{ steps.version.outputs.VERSION }}

      - name: Build and push Probe image
        uses: docker/build-push-action@v5
        with:
          context: ./probe
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/coruja-probe:latest
            ${{ secrets.DOCKER_USERNAME }}/coruja-probe:${{ steps.version.outputs.VERSION }}

      - name: Build and push AI Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-agent
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/coruja-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/coruja-ai:${{ steps.version.outputs.VERSION }}

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    needs: [build-windows, build-linux, build-macos, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release package
        run: |
          mkdir -p release
          
          # Copiar arquivos essenciais
          cp -r api probe frontend ai-agent worker release/
          cp docker-compose.yml .env.example README.md release/
          cp update_and_restart.ps1 restart.bat release/
          
          # Criar arquivo de versão
          echo "${{ github.ref_name }}" > release/version.txt
          
          # Criar ZIP para atualização automática
          cd release
          zip -r ../coruja-update-${{ github.ref_name }}.zip .
          cd ..

      - name: Generate changelog
        id: changelog
        run: |
          # Extrair changelog desde última tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Coruja Monitoring ${{ github.ref_name }}
          body: |
            ## 🦉 Coruja Monitoring ${{ github.ref_name }}
            
            ### 📦 Instaladores Disponíveis
            
            - **Windows**: CorujaMonitoring-${{ github.ref_name }}.msi
            - **Linux (Debian/Ubuntu)**: coruja-monitoring_${{ github.ref_name }}_amd64.deb
            - **Linux (RedHat/CentOS)**: coruja-monitoring-${{ github.ref_name }}.x86_64.rpm
            - **Linux (Universal)**: CorujaMonitoring-${{ github.ref_name }}-x86_64.AppImage
            - **macOS**: CorujaMonitoring-${{ github.ref_name }}.dmg
            - **Atualização Automática**: coruja-update-${{ github.ref_name }}.zip
            
            ### 🐳 Docker Images
            
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/coruja-api:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/coruja-probe:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/coruja-ai:${{ github.ref_name }}
            ```
            
            ### 📝 Changelog
            
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### 📚 Documentação
            
            Consulte o [README.md](README.md) para instruções de instalação e uso.
            
            ---
            
            **Instalação Rápida (Windows)**:
            ```powershell
            # Baixar e executar o instalador MSI
            # Ou usar o script de atualização automática
            ```
            
            **Instalação Rápida (Linux)**:
            ```bash
            # Debian/Ubuntu
            sudo dpkg -i coruja-monitoring_${{ github.ref_name }}_amd64.deb
            
            # RedHat/CentOS
            sudo rpm -i coruja-monitoring-${{ github.ref_name }}.x86_64.rpm
            
            # AppImage (Universal)
            chmod +x CorujaMonitoring-${{ github.ref_name }}-x86_64.AppImage
            ./CorujaMonitoring-${{ github.ref_name }}-x86_64.AppImage
            ```
          files: |
            artifacts/windows-installer/*.msi
            artifacts/linux-packages/*.deb
            artifacts/linux-packages/*.rpm
            artifacts/linux-packages/*.AppImage
            artifacts/macos-installer/*.dmg
            coruja-update-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Notify on Success
  # ============================================
  notify:
    needs: [create-release]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send notification
        run: |
          echo "✅ Release ${{ github.ref_name }} criado com sucesso!"
          echo "📦 Instaladores disponíveis em: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
