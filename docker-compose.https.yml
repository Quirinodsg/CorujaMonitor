# Docker Compose com HTTPS (Let's Encrypt)
# Adiciona Nginx e Certbot para SSL automático

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: coruja-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - coruja-network

  certbot:
    image: certbot/certbot
    container_name: coruja-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - coruja-network

  # Sobrescrever frontend para não expor porta diretamente
  frontend:
    ports: []
    expose:
      - "3000"

  # Sobrescrever API para não expor porta diretamente
  api:
    ports: []
    expose:
      - "8000"

networks:
  coruja-network:
    driver: bridge
